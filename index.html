
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Tracking</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;overflow:hidden;width:100vw;height:100vh;font-family:monospace}
video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);opacity:0.25}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#status{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3);transition:color .4s}
#status.active{color:rgba(255,180,255,.8)}
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:rgba(255,255,255,.4);font-size:11px;letter-spacing:.2em;text-transform:uppercase}
.spinner{width:36px;height:36px;border:2px solid rgba(255,255,255,.08);border-top-color:rgba(255,180,255,.6);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="status">Zeig beide Hände!</div>
<div id="loading"><div class="spinner"></div>Lade Hand Tracking…</div>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const statusEl=document.getElementById('status');
const loadingEl=document.getElementById('loading');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// Fingertip indices für beide Hände
const TIPS=[4,8,12,16,20];
const NODES=16;

// Bänder zwischen je einem Fingertip der linken und rechten Hand
// 5 Fingertips x 5 Fingertips = bis zu 25 Bänder, wir nehmen 5 schönste
const PAIRS=[[4,4],[8,8],[12,12],[16,16],[20,20],[4,8],[8,12],[12,16],[16,20]];

let bands=PAIRS.map(()=>Array.from({length:NODES},()=>({x:0,y:0,vx:0,vy:0})));
let handData=[];

function getPoint(hand,idx){return{x:hand[idx].x*W,y:hand[idx].y*H};}

function updateBand(band,a,b){
  band[0].x=a.x;band[0].y=a.y;
  band[NODES-1].x=b.x;band[NODES-1].y=b.y;
  for(let i=1;i<NODES-1;i++){
    const t=i/(NODES-1);
    const tx=a.x+(b.x-a.x)*t,ty=a.y+(b.y-a.y)*t;
    const sag=Math.sin(Math.PI*t)*30;
    band[i].vx+=(tx-band[i].x)*.15;
    band[i].vy+=(ty+sag-band[i].y)*.15;
    band[i].vy+=.3;
    band[i].vx*=.82;band[i].vy*=.82;
    band[i].x+=band[i].vx;band[i].y+=band[i].vy;
  }
}

function drawBand(band,hue,alpha){
  const dist=Math.sqrt((band[0].x-band[NODES-1].x)**2+(band[0].y-band[NODES-1].y)**2);
  const stretch=Math.min(dist/(W*.4),1);
  const h=hue-stretch*80;
  ctx.beginPath();ctx.moveTo(band[0].x,band[0].y);
  for(let i=1;i<band.length;i++)ctx.lineTo(band[i].x,band[i].y);
  ctx.shadowBlur=14+stretch*20;
  ctx.shadowColor=`hsla(${h},90%,70%,.8)`;
  ctx.strokeStyle=`hsla(${h},80%,72%,${alpha})`;
  ctx.lineWidth=1.8;ctx.lineCap='round';ctx.stroke();
  ctx.shadowBlur=0;
}

function drawHands(){
  const C=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
  for(const hand of handData){
    ctx.shadowBlur=3;ctx.strokeStyle='rgba(200,150,255,.18)';ctx.lineWidth=1;
    for(const[a,b]of C){ctx.beginPath();ctx.moveTo(hand[a].x*W,hand[a].y*H);ctx.lineTo(hand[b].x*W,hand[b].y*H);ctx.stroke();}
    for(const pt of hand){ctx.fillStyle='rgba(220,180,255,.4)';ctx.beginPath();ctx.arc(pt.x*W,pt.y*H,2,0,Math.PI*2);ctx.fill();}
    for(const tip of TIPS){
      const p=hand[tip];
      ctx.shadowBlur=20;ctx.shadowColor='rgba(255,150,255,1)';
      ctx.fillStyle='rgba(255,210,255,1)';
      ctx.beginPath();ctx.arc(p.x*W,p.y*H,6,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.shadowBlur=0;
}

function render(){
  ctx.clearRect(0,0,W,H);
  const vg=ctx.createRadialGradient(W/2,H/2,H*.1,W/2,H/2,H*.9);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,8,.8)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  if(handData.length===2){
    PAIRS.forEach(([ai,bi],i)=>{
      const a=getPoint(handData[0],ai);
      const b=getPoint(handData[1],bi);
      updateBand(bands[i],a,b);
      const hue=260+i*20;
      const alpha=i<5?0.95:0.5;
      drawBand(bands[i],hue,alpha);
    });
  }

  drawHands();
  requestAnimationFrame(render);
}

async function init(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:1280,height:720,facingMode:'user'},audio:false});
    video.srcObject=stream;await new Promise(r=>video.onloadedmetadata=r);
    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:.75,minTrackingConfidence:.65});
    hands.onResults(r=>{
      handData=(r.multiHandLandmarks||[]).map(lm=>lm.map(p=>({x:1-p.x,y:p.y})));
      const c=handData.length;
      statusEl.textContent=c===2?'Zieh die Hände auseinander!':c===1?'Zeig die zweite Hand!':'Zeig beide Hände!';
      statusEl.className=c===2?'active':'';
    });
    const cam=new Camera(video,{onFrame:async()=>{await hands.send({image:video});},width:1280,height:720});
    await cam.start();loadingEl.style.display='none';render();
  }catch(e){
    loadingEl.innerHTML='<p style="color:rgba(255,100,100,.7)">Kamera-Zugriff verweigert.<br>Bitte erlaube die Kamera.</p>';
  }
}
init();
</script>
</body>
</html>
