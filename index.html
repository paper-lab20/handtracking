<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Tracking</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;overflow:hidden;width:100vw;height:100vh;font-family:monospace}
video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);opacity:0.25}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#status{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3);transition:color .4s}
#status.active{color:rgba(255,180,255,.8)}
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:rgba(255,255,255,.4);font-size:11px;letter-spacing:.2em;text-transform:uppercase}
.spinner{width:36px;height:36px;border:2px solid rgba(255,255,255,.08);border-top-color:rgba(255,180,255,.6);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="status">Zeig beide Hände!</div>
<div id="loading"><div class="spinner"></div>Lade Hand Tracking…</div>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const statusEl=document.getElementById('status');
const loadingEl=document.getElementById('loading');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const NODES=20;
let band=Array.from({length:NODES},()=>({x:0,y:0,vx:0,vy:0}));
let handData=[];
function getAnchor(hand){return{x:hand[8].x*W,y:hand[8].y*H};}
function updateBand(){
  if(handData.length<2){
    for(let i=0;i<band.length;i++){band[i].vx+=(W/2-band[i].x)*.05;band[i].vy+=(H/2-band[i].y)*.05;band[i].vx*=.8;band[i].vy*=.8;band[i].x+=band[i].vx;band[i].y+=band[i].vy;}
    return;
  }
  const a=getAnchor(handData[0]),b=getAnchor(handData[1]);
  band[0].x=a.x;band[0].y=a.y;band[NODES-1].x=b.x;band[NODES-1].y=b.y;
  for(let i=1;i<NODES-1;i++){
    const t=i/(NODES-1);
    const tx=a.x+(b.x-a.x)*t,ty=a.y+(b.y-a.y)*t;
    const sag=Math.sin(Math.PI*t)*40;
    band[i].vx+=(tx-band[i].x)*.12;band[i].vy+=(ty+sag-band[i].y)*.12;
    band[i].vy+=.4;band[i].vx*=.85;band[i].vy*=.85;band[i].x+=band[i].vx;band[i].y+=band[i].vy;
  }
}
function drawBand(){
  if(handData.length<2)return;
  const a=getAnchor(handData[0]),b=getAnchor(handData[1]);
  const dist=Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);
  const stretch=Math.min(dist/(W*.5),1);
  const hue=280-stretch*120;
  ctx.beginPath();ctx.moveTo(band[0].x,band[0].y);
  for(let i=1;i<band.length;i++)ctx.lineTo(band[i].x,band[i].y);
  ctx.shadowBlur=20+stretch*30;ctx.shadowColor=`hsla(${hue},90%,70%,.9)`;
  ctx.strokeStyle=`hsla(${hue},80%,75%,.95)`;ctx.lineWidth=3;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.moveTo(band[0].x,band[0].y);
  for(let i=1;i<band.length;i++)ctx.lineTo(band[i].x,band[i].y);
  ctx.shadowBlur=6;ctx.strokeStyle=`hsla(${hue},100%,92%,.7)`;ctx.lineWidth=1;ctx.stroke();
  ctx.shadowBlur=0;
}
function drawHands(){
  const C=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
  for(const hand of handData){
    ctx.shadowBlur=4;ctx.shadowColor='rgba(200,150,255,.3)';ctx.strokeStyle='rgba(200,150,255,.2)';ctx.lineWidth=1;
    for(const[a,b]of C){ctx.beginPath();ctx.moveTo(hand[a].x*W,hand[a].y*H);ctx.lineTo(hand[b].x*W,hand[b].y*H);ctx.stroke();}
    for(const pt of hand){ctx.shadowBlur=8;ctx.fillStyle='rgba(220,180,255,.5)';ctx.beginPath();ctx.arc(pt.x*W,pt.y*H,2.5,0,Math.PI*2);ctx.fill();}
    const tip=hand[8];ctx.shadowBlur=25;ctx.shadowColor='rgba(255,150,255,1)';ctx.fillStyle='rgba(255,200,255,1)';ctx.beginPath();ctx.arc(tip.x*W,tip.y*H,7,0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;
}
function render(){
  ctx.clearRect(0,0,W,H);
  const vg=ctx.createRadialGradient(W/2,H/2,H*.1,W/2,H/2,H*.9);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,8,.75)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  updateBand();drawBand();drawHands();
  requestAnimationFrame(render);
}
async function init(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:1280,height:720,facingMode:'user'},audio:false});
    video.srcObject=stream;await new Promise(r=>video.onloadedmetadata=r);
    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:.75,minTrackingConfidence:.65});
    hands.onResults(r=>{
      handData=(r.multiHandLandmarks||[]).map(lm=>lm.map(p=>({x:1-p.x,y:p.y})));
      const c=handData.length;
      statusEl.textContent=c===2?'Band aktiv – zieh auseinander!':c===1?'Zeig die zweite Hand!':'Zeig beide Hände!';
      statusEl.className=c===2?'active':'';
    });
    const cam=new Camera(video,{onFrame:async()=>{await hands.send({image:video});},width:1280,height:720});
    await cam.start();loadingEl.style.display='none';render();
  }catch(e){loadingEl.innerHTML='<p style="color:rgba(255,100,100,.7)">Kamera-Zugriff verweigert.<br>Bitte erlaube die Kamera.</p>';}
}
init();
</script>
</body>
</html>
